<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Windows 7 Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap');
      
      body {
        font-family: 'Segoe UI', 'Open Sans', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        user-select: none;
        touch-action: none; /* Prevent browser zooming/scrolling on mobile to feel like an app */
      }
      
      /* Custom Scrollbar for Aero feel */
      ::-webkit-scrollbar {
        width: 14px;
        background-color: transparent;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.15);
        border: 4px solid transparent;
        border-radius: 8px;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(0, 0, 0, 0.3);
      }

      ::selection {
        background: rgba(0, 120, 215, 0.4);
        color: inherit;
      }

      /* Aero Glass Utilities */
      .glass-panel {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-top: 1px solid rgba(255, 255, 255, 0.9);
      }

      .window-shadow {
        box-shadow: 
          0 0 0 1px rgba(0,0,0,0.1),
          0 10px 40px -10px rgba(0,0,0,0.3), 
          0 20px 60px -20px rgba(0,0,0,0.4);
      }

      .taskbar-glass {
        background: rgba(25, 30, 40, 0.75);
        backdrop-filter: blur(20px) saturate(180%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .custom-scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .custom-scrollbar-hide {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
